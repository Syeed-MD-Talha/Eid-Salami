<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ঈদ সালামি স্পিনার</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f0c060;
    --gold-light: #f5d98a;
    --gold-dark: #c8a96e;
    --brown-deep: #2c1810;
    --brown-mid: #4a2a0a;
    --brown-light: #8B5E3C;
    --brown-border: #3d1f05;
    --text-warm: #f0e0a0;

    /* Dynamic sizing via clamp */
    --wheel-size: clamp(240px, 80vmin, 340px);
    --btn-font: clamp(16px, 4.5vw, 22px);
    --title-font: clamp(20px, 6vw, 30px);
    --result-font: clamp(36px, 12vw, 52px);
    --result-sub-font: clamp(14px, 4vw, 20px);
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  body {
    background: var(--brown-deep);
    font-family: 'Noto Serif Bengali', Georgia, serif;
    min-height: 100dvh;
  }

  #app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 4vw, 32px) 16px clamp(28px, 6vw, 52px);
    position: relative;
    overflow: hidden;
    gap: clamp(10px, 3vmin, 20px);
  }

  /* Background pattern */
  .bg-pattern {
    position: absolute; inset: 0;
    pointer-events: none; opacity: 0.06;
    background-image:
      repeating-linear-gradient(45deg, #c8a96e 0px, #c8a96e 1px, transparent 1px, transparent 12px),
      repeating-linear-gradient(-45deg, #c8a96e 0px, #c8a96e 1px, transparent 1px, transparent 12px);
  }

  /* Warm glow in centre */
  .bg-glow {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(200,120,20,0.18) 0%, transparent 70%);
  }

  /* ── Title ── */
  .title-box {
    text-align: center;
    z-index: 10;
    flex-shrink: 0;
  }
  .title-box h1 {
    font-size: var(--title-font);
    font-weight: 900;
    letter-spacing: clamp(1px, 0.5vw, 3px);
    color: var(--gold);
    text-shadow: 0 1px 0 #7a4a10, 0 2px 0 #5a3008, 0 3px 8px rgba(0,0,0,0.6);
    line-height: 1.1;
  }
  .title-box p {
    font-size: clamp(11px, 3.2vw, 15px);
    color: var(--gold-dark);
    margin-top: 4px;
    letter-spacing: clamp(0.5px, 0.3vw, 1.5px);
  }

  /* ── Wheel container ── */
  .wheel-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    width: var(--wheel-size);
    height: var(--wheel-size);
    overflow: visible;
    margin-top: 44px; /* room for pointer above */
  }

  /* Ornate outer ring */
  .ring-outer {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(
      #3d1f05 0deg,#8B5E3C 10deg,#c8a96e 20deg,#8B5E3C 30deg,
      #3d1f05 40deg,#8B5E3C 50deg,#c8a96e 60deg,#8B5E3C 70deg,
      #3d1f05 80deg,#8B5E3C 90deg,#c8a96e 100deg,#8B5E3C 110deg,
      #3d1f05 120deg,#8B5E3C 130deg,#c8a96e 140deg,#8B5E3C 150deg,
      #3d1f05 160deg,#8B5E3C 170deg,#c8a96e 180deg,#8B5E3C 190deg,
      #3d1f05 200deg,#8B5E3C 210deg,#c8a96e 220deg,#8B5E3C 230deg,
      #3d1f05 240deg,#8B5E3C 250deg,#c8a96e 260deg,#8B5E3C 270deg,
      #3d1f05 280deg,#8B5E3C 290deg,#c8a96e 300deg,#8B5E3C 310deg,
      #3d1f05 320deg,#8B5E3C 330deg,#c8a96e 340deg,#8B5E3C 350deg,#3d1f05 360deg
    );
    box-shadow: 0 0 0 3px #3d1f05, inset 0 0 0 2px rgba(0,0,0,0.3),
                0 8px 30px rgba(0,0,0,0.5);
    z-index: 1;
  }

  .ring-inner-border {
    position: absolute;
    top: 4.5%; left: 4.5%; right: 4.5%; bottom: 4.5%;
    border-radius: 50%;
    border: 3px solid #3d1f05;
    z-index: 3; pointer-events: none;
  }

  canvas {
    position: absolute;
    top: 4.5%; left: 4.5%;
    border-radius: 50%;
    z-index: 2;
    width: 91%;
    height: 91%;
  }

  /* Pointer */
  .pointer-arm {
    position: absolute;
    top: -38px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    display: flex; flex-direction: column; align-items: center;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
  }
  .pointer-shaft {
    width: 10px;
    height: 26px;
    background: linear-gradient(90deg, #c8a96e 0%, #f0e0a0 50%, #c8a96e 100%);
    border-radius: 3px 3px 0 0;
    border: 1px solid #7a5520;
  }
  .pointer-tip {
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 20px solid var(--gold);
  }

  /* Centre boss */
  .center-boss {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(26px, 10%, 38px);
    height: clamp(26px, 10%, 38px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0e0a0, #c8a96e 50%, #7a5520 100%);
    border: 3px solid #3d1f05;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .center-bolt {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 35%; height: 35%;
    border-radius: 50%; background: #3d1f05;
    z-index: 21;
  }

  /* Stand */
  .stand-pole {
    position: absolute; bottom: -3.5%; left: 50%;
    transform: translateX(-50%);
    width: 6%; height: 6%;
    background: linear-gradient(180deg, #a0723c 0%, #5a3008 100%);
    border: 2px solid #3d1f05;
    z-index: 4;
  }
  .stand-base {
    position: absolute; bottom: -9%; left: 50%;
    transform: translateX(-50%);
    width: 37%; height: 7%;
    background: linear-gradient(180deg, #8B5E3C 0%, #5a3008 100%);
    border-radius: 4px 4px 8px 8px;
    border: 2px solid #3d1f05;
    z-index: 5;
  }

  /* ── Spin button ── */
  #spinBtn {
    z-index: 10;
    flex-shrink: 0;
    padding: clamp(10px, 3.5vw, 16px) clamp(28px, 10vw, 56px);
    font-size: var(--btn-font);
    font-weight: 700;
    font-family: 'Noto Serif Bengali', Georgia, serif;
    letter-spacing: clamp(1px, 0.3vw, 2px);
    color: var(--brown-deep);
    background: linear-gradient(180deg, #f0e0a0 0%, #c8a96e 40%, #a07840 100%);
    border: 3px solid var(--brown-border);
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 0 #3d1f05, 0 6px 16px rgba(0,0,0,0.4);
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-user-select: none; user-select: none;
    min-width: clamp(180px, 55vw, 260px);
    margin-top: clamp(8px, 3vmin, 16px);
  }
  #spinBtn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #3d1f05, 0 2px 6px rgba(0,0,0,0.4);
  }
  #spinBtn:disabled {
    opacity: 0.55; cursor: not-allowed; transform: none;
    box-shadow: 0 4px 0 #3d1f05;
  }

  /* ── Result box ── */
  .result-box {
    z-index: 10;
    flex-shrink: 0;
    background: linear-gradient(180deg, #4a2a0a 0%, #2c1810 100%);
    border: 2px solid var(--gold-dark);
    border-radius: 14px;
    padding: clamp(14px, 4vw, 22px) clamp(24px, 8vw, 44px);
    text-align: center;
    width: clamp(220px, 80vw, 320px);
    display: none;
    box-shadow: 0 0 0 1px #3d1f05, inset 0 1px 0 rgba(240,224,160,0.15),
                0 8px 24px rgba(0,0,0,0.4);
  }
  .result-box.show {
    display: block;
    animation: popIn 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.55); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .result-label {
    font-size: clamp(11px, 3.2vw, 14px);
    color: var(--gold-dark);
    margin-bottom: 4px;
    letter-spacing: clamp(1px, 0.4vw, 2px);
    text-transform: uppercase;
  }
  .result-amount {
    font-size: var(--result-font);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 1px 0 #7a4a10, 0 2px 6px rgba(0,0,0,0.5);
    line-height: 1.1;
  }
  .result-sub {
    font-size: var(--result-sub-font);
    color: #e8d080;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: fall 2.2s ease-in forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── Landscape-specific layout ── */
  @media (orientation: landscape) and (max-height: 500px) {
    #app {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
    }
    .title-box { width: 100%; flex-shrink: 0; }
    .wheel-wrap {
      --wheel-size: clamp(160px, 55vh, 260px);
    }
    .controls-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
  }
</style>
</head>
<body>
<div id="app">
  <div class="bg-pattern"></div>
  <div class="bg-glow"></div>

  <div class="title-box">
    <h1>🌙 ঈদ সালামি 🌙</h1>
    <p>স্পিন করো — সালামি জিতে নাও</p>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="ring-outer"></div>
    <canvas id="canvas"></canvas>
    <div class="ring-inner-border"></div>
    <div class="pointer-arm">
      <div class="pointer-shaft"></div>
      <div class="pointer-tip"></div>
    </div>
    <div class="center-boss"><div class="center-bolt"></div></div>
    <div class="stand-pole"></div>
    <div class="stand-base"></div>
  </div>

  <!-- In landscape on small screens, button + result sit beside the wheel -->
  <div class="controls-col" id="controlsCol">
    <button id="spinBtn">🎰 স্পিন করো!</button>
    <div class="result-box" id="resultBox">
      <div class="result-label">তুমি পেলে</div>
      <div class="result-amount" id="resultAmount"></div>
      <div class="result-sub">সালামি মোবারক! 🎁</div>
    </div>
  </div>
</div>

<script>
/* ─── Data ─────────────────────────────────────────── */
const segments = [
  { label: '৫ টাকা',   color: '#8B2020', light: '#d46060', weight: 25 },
  { label: '১০ টাকা',  color: '#7a4a10', light: '#d4944a', weight: 25 },
  { label: '১৫ টাকা',  color: '#1a5c1a', light: '#4aaa4a', weight: 22 },
  { label: '২০ টাকা',  color: '#1a3a7a', light: '#4a7adc', weight: 18 },
  { label: '২৫ টাকা',  color: '#5a1a5a', light: '#a84aa8', weight:  6 },
  { label: '৩০ টাকা',  color: '#1a5a5a', light: '#4ab0b0', weight:  4 },
];

const N = segments.length;
const arc = (2 * Math.PI) / N;
let wheelAngle = 0;
let spinning = false;
const recentResults = [];
const AVOID_LAST = 2;

/* ─── Canvas setup (responsive) ─────────────────────── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function getCanvasSize() {
  const wrap = document.getElementById('wheelWrap');
  // The canvas covers the inner 91% of the wheel wrap
  return Math.round(wrap.offsetWidth * 0.91);
}

function resizeCanvas() {
  const size = getCanvasSize();
  canvas.width = size;
  canvas.height = size;
  drawWheel(wheelAngle);
}

/* ─── Draw ──────────────────────────────────────────── */
function drawWheel(angle) {
  const S = canvas.width;
  const cx = S / 2, cy = S / 2, R = S / 2 - 2;
  ctx.clearRect(0, 0, S, S);

  for (let i = 0; i < N; i++) {
    const startA = angle + i * arc;
    const endA = startA + arc;
    const seg = segments[i];

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startA, endA);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();

    // Subtle grain lines
    for (let s = 0; s < 4; s++) {
      const grainA = startA + (endA - startA) * ((s + 0.5) / 4);
      const grainR = R * (0.2 + (s / 4) * 0.7);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, grainR, grainA, grainA + (endA - startA) * 0.12);
      ctx.strokeStyle = seg.light;
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = 0.1;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Slice border
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startA, endA);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    const midA = startA + arc / 2;
    const textR = R * 0.65;
    const tx = cx + Math.cos(midA) * textR;
    const ty = cy + Math.sin(midA) * textR;
    const fontSize = Math.max(10, Math.round(S * 0.05));
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midA + Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${fontSize}px "Noto Serif Bengali", Georgia, serif`;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(seg.label, 1, 2);
    // Main text
    ctx.fillStyle = '#f0e0a0';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(seg.label, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Outer circle border
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.strokeStyle = '#3d1f05';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Divider lines
  for (let i = 0; i < N; i++) {
    const divA = angle + i * arc;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(divA) * 8, cy + Math.sin(divA) * 8);
    ctx.lineTo(cx + Math.cos(divA) * R, cy + Math.sin(divA) * R);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(divA) * 8, cy + Math.sin(divA) * 8);
    ctx.lineTo(cx + Math.cos(divA) * R, cy + Math.sin(divA) * R);
    ctx.strokeStyle = 'rgba(255,220,120,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Centre dark circle (boss overlay behind the DOM element)
  ctx.beginPath();
  ctx.arc(cx, cy, S * 0.075, 0, 2 * Math.PI);
  ctx.fillStyle = '#2c1810';
  ctx.fill();
  ctx.strokeStyle = '#3d1f05';
  ctx.lineWidth = 2;
  ctx.stroke();
}

/* ─── Spin logic ────────────────────────────────────── */
function angleForSegment(i) {
  return -Math.PI / 2 - i * arc - arc / 2;
}

function getWinner(finalAngle) {
  const pointerAngle = -Math.PI / 2;
  let local = ((pointerAngle - finalAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(local / arc) % N;
}

function weightedPick() {
  let candidates = segments
    .map((s, i) => ({ i, weight: s.weight }))
    .filter(c => c.weight > 0 && !recentResults.includes(c.i));

  if (!candidates.length) {
    candidates = segments.map((s, i) => ({ i, weight: s.weight })).filter(c => c.weight > 0);
  }

  const total = candidates.reduce((sum, c) => sum + c.weight, 0);
  let rand = Math.random() * total;
  for (const c of candidates) { rand -= c.weight; if (rand <= 0) return c.i; }
  return candidates[candidates.length - 1].i;
}

function pickTarget(currentAngle) {
  const targetIdx = weightedPick();
  let base = angleForSegment(targetIdx);
  const jitter = (Math.random() * 0.6 + 0.2) * arc;
  base = base - jitter + arc / 2;
  const minSpins = 6 + Math.floor(Math.random() * 4);
  let diff = ((base - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (diff < 0.1) diff += 2 * Math.PI;
  return { totalRotation: minSpins * 2 * Math.PI + diff, targetIdx };
}

/* ─── Confetti ──────────────────────────────────────── */
function confetti() {
  const colors = ['#f0c060','#c8a96e','#e87040','#60c080','#6080e0','#e060a0'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 9;
    el.style.cssText = `
      left:${5 + Math.random() * 90}vw;
      top:-12px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      width:${size}px; height:${size}px;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-delay:${Math.random() * 0.7}s;
      animation-duration:${1.8 + Math.random() * 1}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }
}

/* ─── Spin button ───────────────────────────────────── */
document.getElementById('spinBtn').addEventListener('click', () => {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  document.getElementById('resultBox').classList.remove('show');

  const { totalRotation } = pickTarget(wheelAngle);
  const duration = 4400 + Math.random() * 700;
  const startAngle = wheelAngle;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    wheelAngle = startAngle + totalRotation * easeOut(progress);
    drawWheel(wheelAngle);
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      btn.disabled = false;
      btn.textContent = '🎰 আবার স্পিন করো!';
      const winIdx = getWinner(wheelAngle);
      recentResults.push(winIdx);
      if (recentResults.length > AVOID_LAST) recentResults.shift();
      document.getElementById('resultAmount').textContent = segments[winIdx].label;
      document.getElementById('resultBox').classList.add('show');
      confetti();
    }
  }
  requestAnimationFrame(animate);
});

/* ─── Resize handling ───────────────────────────────── */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeCanvas, 80);
});
// Also handle orientation change
window.addEventListener('orientationchange', () => {
  setTimeout(resizeCanvas, 200);
});

/* ─── Init ──────────────────────────────────────────── */
// Wait for fonts + layout before sizing canvas
document.fonts.ready.then(() => {
  resizeCanvas();
});
// Fallback in case fonts.ready is slow
setTimeout(resizeCanvas, 300);
</script>
</body>
</html>
